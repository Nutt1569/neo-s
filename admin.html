<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEO-S · Lead Dashboard — Comtech Solution System</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cpolyline points='58,150 58,50 142,150 142,50' fill='none' stroke='%2322D3EE' stroke-width='24' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#070B16; --bg-2:#0C1322; --card:#111A2E; --line:#1E2A44;
    --txt:#EAF0FF; --txt-dim:#95A3C2; --blue:#3B82F6; --cyan:#22D3EE; --violet:#8B5CF6;
    --green:#34D399; --gold:#E2B679; --red:#F87171;
    --grad:linear-gradient(120deg,#22D3EE 0%,#3B82F6 45%,#8B5CF6 100%);
  }
  html { scroll-behavior: smooth; }
  body { font-family:'IBM Plex Sans Thai','Space Grotesk',sans-serif; background:var(--bg); color:var(--txt); line-height:1.55; -webkit-font-smoothing:antialiased; }
  .grad-txt { background:var(--grad); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

  /* ===== LOGIN ===== */
  #login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .login-box { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:44px 38px; text-align:center; max-width:400px; width:100%; box-shadow:0 24px 70px rgba(0,0,0,.5); }
  .login-logo { width:54px; height:54px; margin:0 auto 18px; }
  .login-box h1 { font-size:22px; margin-bottom:6px; }
  .login-box p { color:var(--txt-dim); font-size:14px; margin-bottom:28px; }
  .g-btn { width:100%; display:flex; align-items:center; justify-content:center; gap:11px; background:#fff; color:#1f2937; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; transition:transform .15s,box-shadow .15s; }
  .g-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(0,0,0,.4); }
  .g-btn img { width:20px; height:20px; }
  .login-note { margin-top:18px; font-size:12px; color:var(--txt-dim); }
  .login-err { margin-top:16px; color:var(--red); font-size:13px; display:none; }

  /* ===== NAV ===== */
  nav { position:sticky; top:0; z-index:50; background:rgba(7,11,22,.85); backdrop-filter:blur(14px); border-bottom:1px solid var(--line); }
  .nav-in { max-width:1240px; margin:0 auto; padding:0 24px; height:64px; display:flex; align-items:center; gap:14px; }
  .nav-logo { display:flex; align-items:center; gap:10px; }
  .nav-logo-txt { font-weight:700; font-size:16px; letter-spacing:.5px; }
  .nav-logo-sub { font-size:9px; letter-spacing:2px; color:var(--txt-dim); text-transform:uppercase; }
  .nav-right { margin-left:auto; display:flex; align-items:center; gap:14px; }
  .nav-user { font-size:13px; color:var(--txt-dim); }
  .nav-btn { background:var(--bg-2); border:1px solid var(--line); color:var(--txt-dim); border-radius:9px; padding:8px 14px; font-size:13px; cursor:pointer; font-family:inherit; transition:all .2s; }
  .nav-btn:hover { border-color:var(--blue); color:var(--txt); }
  @media(max-width:680px){ .nav-user{ display:none; } }

  /* ===== APP ===== */
  #app { display:none; }
  .wrap { max-width:1240px; margin:0 auto; padding:28px 24px 60px; }
  .page-head { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:22px; }
  .page-head h1 { font-size:26px; } .page-head .sub { color:var(--txt-dim); font-size:13px; margin-top:2px; }

  .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:22px; }
  .kpi { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:20px 22px; }
  .kpi .ic { font-size:22px; margin-bottom:10px; }
  .kpi .num { font-size:32px; font-weight:700; font-family:'Space Grotesk'; line-height:1; }
  .kpi .lbl { font-size:13px; color:var(--txt-dim); margin-top:6px; }
  @media(max-width:820px){ .kpis{ grid-template-columns:1fr 1fr; } }

  .panel { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px; margin-bottom:22px; }
  .panel-title { font-size:14px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .chart-wrap { height:200px; }

  .toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
  .toolbar input, .toolbar select { background:var(--bg-2); border:1px solid var(--line); border-radius:10px; padding:10px 13px; color:var(--txt); font-family:inherit; font-size:13.5px; outline:none; }
  .toolbar input { flex:1; min-width:180px; } .toolbar input:focus, .toolbar select:focus { border-color:var(--blue); }
  .toolbar select { cursor:pointer; }
  .refresh { margin-left:auto; }

  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  th { text-align:left; color:var(--cyan); font-weight:600; font-size:12px; letter-spacing:.5px; text-transform:uppercase; padding:10px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
  td { padding:13px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
  tr:hover td { background:rgba(59,130,246,.05); }
  .td-name { font-weight:600; }
  .td-contact { color:var(--cyan); }
  .td-msg { color:var(--txt-dim); max-width:280px; font-size:12.5px; }
  .td-date { color:var(--txt-dim); font-size:12px; white-space:nowrap; }
  .pill { display:inline-block; font-size:11.5px; padding:3px 10px; border-radius:999px; border:1px solid var(--line); color:var(--txt-dim); white-space:nowrap; }
  .pill.int { background:rgba(226,182,121,.12); border-color:rgba(226,182,121,.3); color:var(--gold); }
  .st-sel { background:var(--bg-2); border:1px solid var(--line); border-radius:8px; padding:6px 9px; color:var(--txt); font-family:inherit; font-size:12.5px; cursor:pointer; outline:none; }
  .st-NEW{ border-color:var(--cyan); color:var(--cyan); }
  .st-CONTACTED{ border-color:var(--blue); color:var(--blue); }
  .st-QUOTED{ border-color:var(--violet); color:var(--violet); }
  .st-WON{ border-color:var(--green); color:var(--green); }
  .st-LOST{ border-color:var(--txt-dim); color:var(--txt-dim); opacity:.7; }

  .empty { text-align:center; padding:50px 20px; color:var(--txt-dim); }
  .empty .em-ic { font-size:46px; margin-bottom:14px; }
  .loading { text-align:center; padding:40px; color:var(--txt-dim); }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--card); border:1px solid var(--blue); border-radius:12px; padding:12px 20px; font-size:14px; box-shadow:0 12px 34px rgba(0,0,0,.5); opacity:0; transition:opacity .25s; pointer-events:none; z-index:100; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs><linearGradient id="ng" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#22D3EE"/><stop offset="50%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#8B5CF6"/></linearGradient></defs></svg>

<!-- ===== LOGIN ===== -->
<div id="login">
  <div class="login-box">
    <div class="login-logo"><svg viewBox="0 0 200 200" width="54" height="54"><polyline points="58,150 58,50 142,150 142,50" fill="none" stroke="url(#ng)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h1>NEO-S <span class="grad-txt">Lead Dashboard</span></h1>
    <p>หลังบ้านจัดการลูกค้าที่สนใจ — Comtech Solution System</p>
    <button class="g-btn" onclick="loginGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
      เข้าสู่ระบบด้วย Google
    </button>
    <div class="login-note">🔒 เฉพาะผู้ดูแลที่ได้รับสิทธิ์เท่านั้น</div>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <nav>
    <div class="nav-in">
      <div class="nav-logo">
        <svg viewBox="0 0 200 200" width="34" height="34"><polyline points="58,150 58,50 142,150 142,50" fill="none" stroke="url(#ng)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <div><div class="nav-logo-txt">NEO-S</div><div class="nav-logo-sub">Lead Dashboard</div></div>
      </div>
      <div class="nav-right">
        <span class="nav-user" id="navUser"></span>
        <button class="nav-btn" onclick="logout()">ออกจากระบบ</button>
      </div>
    </div>
  </nav>

  <div class="wrap">
    <div class="page-head">
      <div><h1>📥 Lead จากโนวา</h1><div class="sub" id="updatedAt"></div></div>
      <button class="nav-btn refresh" onclick="loadLeads(true)">🔄 รีเฟรช</button>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="ic">📊</div><div class="num grad-txt" id="kTotal">0</div><div class="lbl">Lead ทั้งหมด</div></div>
      <div class="kpi"><div class="ic">✨</div><div class="num" style="color:var(--cyan)" id="kNew">0</div><div class="lbl">ใหม่ (ยังไม่ติดต่อ)</div></div>
      <div class="kpi"><div class="ic">📅</div><div class="num" style="color:var(--blue)" id="kWeek">0</div><div class="lbl">7 วันล่าสุด</div></div>
      <div class="kpi"><div class="ic">🎉</div><div class="num" style="color:var(--green)" id="kWon">0</div><div class="lbl">ปิดได้ (WON)</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">📈 Lead เข้ามารายวัน (14 วันล่าสุด)</div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <div class="panel">
      <div class="toolbar">
        <input id="search" type="text" placeholder="🔍 ค้นหา ชื่อ / อีเมล / เบอร์ / ข้อความ" oninput="renderTable()">
        <select id="fStatus" onchange="renderTable()">
          <option value="">ทุกสถานะ</option>
          <option value="NEW">ใหม่</option>
          <option value="CONTACTED">ติดต่อแล้ว</option>
          <option value="QUOTED">เสนอราคาแล้ว</option>
          <option value="WON">ปิดได้</option>
          <option value="LOST">ไม่สำเร็จ</option>
        </select>
        <select id="fInterest" onchange="renderTable()">
          <option value="">ทุกแพ็กเกจ</option>
          <option>Starter</option><option>Business</option><option>Enterprise</option><option>ยังไม่แน่ใจ</option>
        </select>
      </div>
      <div id="tableArea"><div class="loading">กำลังโหลด…</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG — แก้ ADMIN_EMAILS ถ้าจะเพิ่มผู้ดูแล
// ============================================================
const SUPABASE_URL  = 'https://hdpjwegiorofmferhlhq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkcGp3ZWdpb3JvZm1mZXJobGhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1Nzc0MzksImV4cCI6MjA5NTE1MzQzOX0.EeMA2b7MZDMYFN0G-7JOTj0g5ZSV1CQqfyMl7yWAI1o';
const ADMIN_EMAILS  = ['kritsada.nutt1981@gmail.com', 'kritsada.msit04@gmail.com'];

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const STATUSES = ['NEW','CONTACTED','QUOTED','WON','LOST'];
const STATUS_TH = { NEW:'ใหม่', CONTACTED:'ติดต่อแล้ว', QUOTED:'เสนอราคาแล้ว', WON:'ปิดได้', LOST:'ไม่สำเร็จ' };
let LEADS = [];
let chart = null;

// ===== AUTH =====
function loginGoogle(){
  sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: window.location.href.split('#')[0] } });
}
function logout(){ sb.auth.signOut().then(()=> location.reload()); }

function showLoginErr(msg){ const e=document.getElementById('loginErr'); e.textContent=msg; e.style.display='block'; }

async function checkAuth(){
  const { data:{ session } } = await sb.auth.getSession();
  if (!session){ document.getElementById('login').style.display='flex'; document.getElementById('app').style.display='none'; return; }
  const email = (session.user.email || '').toLowerCase();
  if (!ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(email)){
    document.getElementById('login').style.display='flex';
    document.getElementById('app').style.display='none';
    showLoginErr('บัญชี ' + email + ' ไม่มีสิทธิ์เข้าถึง — ติดต่อผู้ดูแล');
    await sb.auth.signOut();
    return;
  }
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('navUser').textContent = email;
  loadLeads();
}

// ===== DATA =====
async function loadLeads(manual){
  try {
    const { data, error } = await sb.from('neos_leads').select('*').order('created_at', { ascending:false });
    if (error) throw error;
    LEADS = data || [];
    renderKPIs(); buildChart(); renderTable();
    document.getElementById('updatedAt').textContent = 'อัปเดต: ' + fmtDateTime(new Date().toISOString());
    if (manual) toast('รีเฟรชแล้ว ✅');
  } catch(e){
    document.getElementById('tableArea').innerHTML = '<div class="empty"><div class="em-ic">⚠️</div>โหลดข้อมูลไม่ได้: ' + (e.message||e) + '<br><small>เช็กว่ารัน SQL สิทธิ์อ่าน Lead แล้วหรือยัง</small></div>';
  }
}

function renderKPIs(){
  const now = Date.now(), wk = now - 7*864e5;
  document.getElementById('kTotal').textContent = LEADS.length;
  document.getElementById('kNew').textContent   = LEADS.filter(l=>(l.status||'NEW')==='NEW').length;
  document.getElementById('kWeek').textContent  = LEADS.filter(l=> new Date(l.created_at).getTime() >= wk).length;
  document.getElementById('kWon').textContent   = LEADS.filter(l=>l.status==='WON').length;
}

function buildChart(){
  const days = [], counts = [];
  for (let i=13;i>=0;i--){ const d=new Date(Date.now()-i*864e5); const key=d.toISOString().slice(0,10); days.push(d.toLocaleDateString('th-TH',{day:'numeric',month:'short'})); counts.push(LEADS.filter(l=>(l.created_at||'').slice(0,10)===key).length); }
  const ctx = document.getElementById('chart');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type:'bar',
    data:{ labels:days, datasets:[{ data:counts, backgroundColor:'rgba(59,130,246,.55)', borderColor:'#22D3EE', borderWidth:1, borderRadius:5 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
      scales:{ x:{ grid:{display:false}, ticks:{ color:'#95A3C2', font:{size:10} } }, y:{ beginAtZero:true, ticks:{ color:'#95A3C2', precision:0 }, grid:{ color:'rgba(30,42,68,.6)' } } } }
  });
}

function renderTable(){
  const q = (document.getElementById('search').value||'').toLowerCase().trim();
  const fs = document.getElementById('fStatus').value;
  const fi = document.getElementById('fInterest').value;
  let rows = LEADS.filter(l=>{
    const st = l.status || 'NEW';
    if (fs && st !== fs) return false;
    if (fi && (l.interest||'') !== fi) return false;
    if (q){ const blob = [l.name,l.contact,l.email,l.phone,l.message,l.interest].join(' ').toLowerCase(); if (!blob.includes(q)) return false; }
    return true;
  });
  if (!LEADS.length){ document.getElementById('tableArea').innerHTML = '<div class="empty"><div class="em-ic">📭</div>ยังไม่มี Lead เข้ามา<br><small>เมื่อมีคนกรอกฟอร์มในโนวา (เว็บบริษัท) จะขึ้นที่นี่</small></div>'; return; }
  if (!rows.length){ document.getElementById('tableArea').innerHTML = '<div class="empty"><div class="em-ic">🔍</div>ไม่พบ Lead ตามที่กรอง</div>'; return; }
  let h = '<div class="table-wrap"><table><thead><tr><th>วันที่</th><th>ชื่อ</th><th>ติดต่อ</th><th>สนใจ</th><th>ข้อความ</th><th>ที่มา</th><th>สถานะ</th></tr></thead><tbody>';
  h += rows.map(l=>{
    const st = l.status || 'NEW';
    const opts = STATUSES.map(s=>`<option value="${s}" ${s===st?'selected':''}>${STATUS_TH[s]}</option>`).join('');
    return `<tr>
      <td class="td-date">${fmtDateTime(l.created_at)}</td>
      <td class="td-name">${esc(l.name)||'-'}</td>
      <td class="td-contact">${esc(l.contact||l.email||l.phone)||'-'}</td>
      <td>${l.interest?`<span class="pill int">${esc(l.interest)}</span>`:'<span class="pill">-</span>'}</td>
      <td class="td-msg">${esc(l.message)||'<span style="opacity:.4">—</span>'}</td>
      <td><span class="pill">${esc(l.source)||'-'}</span></td>
      <td><select class="st-sel st-${st}" onchange="updateStatus('${esc(l.lead_id)}', this.value, this)">${opts}</select></td>
    </tr>`;
  }).join('');
  h += '</tbody></table></div>';
  document.getElementById('tableArea').innerHTML = h;
}

async function updateStatus(id, status, el){
  try {
    el.className = 'st-sel st-' + status;
    const { error } = await sb.from('neos_leads').update({ status }).eq('lead_id', id);
    if (error) throw error;
    const lead = LEADS.find(l=>l.lead_id===id); if (lead) lead.status = status;
    renderKPIs();
    toast('อัปเดตสถานะ → ' + STATUS_TH[status]);
  } catch(e){ toast('บันทึกไม่สำเร็จ: ' + (e.message||e)); }
}

// ===== UTILS =====
function fmtDateTime(iso){ if(!iso) return '-'; const d=new Date(iso); return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'2-digit'}) + ' ' + d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return s==null?'':String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

// ===== INIT =====
sb.auth.onAuthStateChange(()=> checkAuth());
checkAuth();
window.addEventListener('focus', ()=>{ if(document.getElementById('app').style.display==='block') loadLeads(); });
</script>
</body>
</html>
